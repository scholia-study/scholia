name: Build

on:
    push:
        branches: [main]
        # Workflow-level filter — coarse gate so trivial-only pushes
        # (README edits, etc.) don't even spin up the `changes` runner.
        # Fine-grained per-service gating lives in the `changes` job
        # below.
        paths:
            - "apps/**"
            - "jobs/**"
            - "packages/**"
            - "db/migrations/**"
            - ".sqlx/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - ".github/workflows/build.yml"
    workflow_dispatch:

permissions:
    contents: read
    packages: write

concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Classify what changed and emit a JSON build matrix containing
    # only the services that need rebuilding. The downstream `build`
    # job iterates that matrix, so unchanged services don't even spawn
    # a runner.
    #
    # We can't use job-level `if: matrix.service == ...` to gate matrix
    # entries — GHA doesn't expose the `matrix` context at job-level
    # `if:`. Dynamic-matrix-via-fromJSON is the workaround.
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.matrix.outputs.matrix }}
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  # `Cargo.lock` changes appear on every Rust filter
                  # because a lockfile shift can change transitive deps
                  # for any binary. Coarse but correct.
                  filters: |
                      api:
                        - 'apps/api/**'
                        - 'db/migrations/**'
                        - '.sqlx/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'
                      web:
                        - 'apps/web/**'
                        - 'package.json'
                        - 'pnpm-lock.yaml'
                        - 'pnpm-workspace.yaml'
                        - '.github/workflows/build.yml'
                      proxy:
                        - 'apps/proxy/**'
                        - '.github/workflows/build.yml'
                      ingest_bible:
                        - 'packages/bible_to_db/**'
                        - 'jobs/ingest-bible/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'
                      ingest_kant1:
                        - 'packages/kant1_*/**'
                        - 'packages/common/**'
                        - 'jobs/ingest-kant1/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'

            - name: Build matrix
              id: matrix
              env:
                  EVENT: ${{ github.event_name }}
                  API: ${{ steps.filter.outputs.api }}
                  WEB: ${{ steps.filter.outputs.web }}
                  PROXY: ${{ steps.filter.outputs.proxy }}
                  INGEST_BIBLE: ${{ steps.filter.outputs.ingest_bible }}
                  INGEST_KANT1: ${{ steps.filter.outputs.ingest_kant1 }}
              run: |
                  # Manual (workflow_dispatch) trigger = rebuild
                  # everything. paths-filter has no useful base to
                  # compare to when invoked manually with no commits
                  # in flight.
                  if [[ "$EVENT" == "workflow_dispatch" ]]; then
                      API=true; WEB=true; PROXY=true
                      INGEST_BIBLE=true; INGEST_KANT1=true
                  fi

                  matrix='[]'
                  add() {
                      matrix=$(echo "$matrix" | jq -c \
                          --arg s "$1" --arg c "$2" --arg f "$3" \
                          '. += [{"service": $s, "context": $c, "file": $f}]')
                  }

                  if [[ "$API"           == "true" ]]; then add api          .          apps/api/Dockerfile;          fi
                  if [[ "$WEB"           == "true" ]]; then add web          .          apps/web/Dockerfile;          fi
                  if [[ "$PROXY"         == "true" ]]; then add proxy        apps/proxy apps/proxy/Dockerfile;        fi
                  if [[ "$INGEST_BIBLE"  == "true" ]]; then add ingest-bible .          jobs/ingest-bible/Dockerfile; fi
                  if [[ "$INGEST_KANT1"  == "true" ]]; then add ingest-kant1 .          jobs/ingest-kant1/Dockerfile; fi

                  echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
                  echo "Build matrix: $matrix"

    build:
        name: Build ${{ matrix.service }}
        needs: changes
        if: needs.changes.outputs.matrix != '[]'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                include: ${{ fromJSON(needs.changes.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # docker/metadata-action distills the trigger context into a
            # set of OCI tags + labels.
            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ghcr.io/${{ github.repository_owner }}/scholia-${{ matrix.service }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix={{branch}}-,format=short

            # cache-from / cache-to use the GitHub Actions cache so the
            # cargo-chef cooked-deps layer (api) and pnpm install layers
            # (web) survive across runs. Scoped per service so the three
            # matrix jobs don't trample each other.
            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.file }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.service }}
