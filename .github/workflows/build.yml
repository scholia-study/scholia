name: Build

on:
    push:
        branches: [main]
        paths:
            - "apps/**"
            - "jobs/**"
            - "packages/**"
            - "db/migrations/**"
            - ".sqlx/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - ".github/workflows/build.yml"
    workflow_dispatch:

permissions:
    contents: read
    packages: write

concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.matrix.outputs.matrix }}
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v4
              id: filter
              with:
                  # `Cargo.lock` changes appear on every Rust filter
                  # because a lockfile shift can change transitive deps
                  # for any binary. Coarse but correct.
                  filters: |
                      api:
                        - 'apps/api/**'
                        - 'db/migrations/**'
                        - '.sqlx/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'
                      web:
                        - 'apps/web/**'
                        - 'package.json'
                        - 'pnpm-lock.yaml'
                        - 'pnpm-workspace.yaml'
                        - '.github/workflows/build.yml'
                      proxy:
                        - 'apps/proxy/**'
                        - '.github/workflows/build.yml'
                      ingest_bible:
                        - 'packages/bible_to_db/**'
                        - 'packages/reconcile/**'
                        - 'packages/common/**'
                        - 'jobs/ingest-bible/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'
                      ingest_kant1:
                        - 'packages/kant1_*/**'
                        - 'packages/common/**'
                        - 'packages/reconcile/**'
                        - 'jobs/ingest-kant1/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'
                      ingest_shakespeare1:
                        - 'packages/shakespeare1_*/**'
                        - 'packages/common/**'
                        - 'packages/reconcile/**'
                        - 'jobs/ingest-shakespeare1/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'

            - name: Build matrix
              id: matrix
              env:
                  EVENT: ${{ github.event_name }}
                  API: ${{ steps.filter.outputs.api }}
                  WEB: ${{ steps.filter.outputs.web }}
                  PROXY: ${{ steps.filter.outputs.proxy }}
                  INGEST_BIBLE: ${{ steps.filter.outputs.ingest_bible }}
                  INGEST_KANT1: ${{ steps.filter.outputs.ingest_kant1 }}
                  INGEST_SHAKESPEARE1: ${{ steps.filter.outputs.ingest_shakespeare1 }}
              run: |
                  # Manual (workflow_dispatch) trigger = rebuild
                  # everything. paths-filter has no useful base to
                  # compare to when invoked manually with no commits
                  # in flight.
                  if [[ "$EVENT" == "workflow_dispatch" ]]; then
                      API=true; WEB=true; PROXY=true
                      INGEST_BIBLE=true; INGEST_KANT1=true; INGEST_SHAKESPEARE1=true
                  fi

                  matrix='[]'
                  add() {
                      matrix=$(echo "$matrix" | jq -c \
                          --arg s "$1" --arg c "$2" --arg f "$3" \
                          '. += [{"service": $s, "context": $c, "file": $f}]')
                  }

                  if [[ "$API"           == "true" ]]; then add api          .          apps/api/Dockerfile;          fi
                  if [[ "$WEB"           == "true" ]]; then add web          .          apps/web/Dockerfile;          fi
                  if [[ "$PROXY"         == "true" ]]; then add proxy        apps/proxy apps/proxy/Dockerfile;        fi
                  if [[ "$INGEST_BIBLE"  == "true" ]]; then add ingest-bible .          jobs/ingest-bible/Dockerfile; fi
                  if [[ "$INGEST_KANT1"  == "true" ]]; then add ingest-kant1 .          jobs/ingest-kant1/Dockerfile; fi
                  if [[ "$INGEST_SHAKESPEARE1" == "true" ]]; then add ingest-shakespeare1 . jobs/ingest-shakespeare1/Dockerfile; fi

                  echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
                  echo "Build matrix: $matrix"

    build:
        name: Build ${{ matrix.service }}
        needs: changes
        if: needs.changes.outputs.matrix != '[]'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                include: ${{ fromJSON(needs.changes.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # docker/metadata-action distills the trigger context into a
            # set of OCI tags + labels.
            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ghcr.io/${{ github.repository_owner }}/scholia-${{ matrix.service }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix={{branch}}-,format=short

            # cache-from / cache-to use the GitHub Actions cache so the
            # cargo-chef cooked-deps layer (api) and pnpm install layers
            # (web) survive across runs. Scoped per service so the three
            # matrix jobs don't trample each other.
            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.file }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.service }}

    bump:
        name: Bump dev image tags
        needs: [changes, build]
        if: needs.changes.outputs.matrix != '[]'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: main
                  token: ${{ secrets.PAT }}

            - name: Rewrite overlay image tags
              env:
                  MATRIX: ${{ needs.changes.outputs.matrix }}
                  SHA: ${{ github.sha }}
              run: |
                  # Must match docker/metadata-action's
                  # `type=sha,format=short` tag (first 7 of the sha).
                  TAG="main-${SHA:0:7}"
                  FILE=infra/k8s/overlays/dev/kustomization.yaml
                  for svc in $(echo "$MATRIX" | jq -r '.[].service'); do
                      case "$svc" in
                          api|web|proxy)
                              img="ghcr.io/scholia-study/scholia-$svc"
                              perl -0777 -pi -e \
                                "s{(name: \Q$img\E\n\s+newTag: )\S+}{\${1}$TAG}g" \
                                "$FILE"
                              echo "bumped $img -> $TAG"
                              ;;
                          *)
                              echo "skip $svc (not Argo-managed)"
                              ;;
                      esac
                  done

            - name: Commit + push if changed
              env:
                  SHA: ${{ github.sha }}
              run: |
                  FILE=infra/k8s/overlays/dev/kustomization.yaml
                  if git diff --quiet -- "$FILE"; then
                      echo "no tag changes to commit"
                      exit 0
                  fi
                  git config user.name "scholia-ci[bot]"
                  git config user.email "ci@scholia.study"
                  git add "$FILE"
                  git commit -m "ci: bump image tags to main-${SHA:0:7} [skip ci]"
                  git push origin HEAD:main
