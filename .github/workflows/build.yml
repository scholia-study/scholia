name: Build

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    build:
        name: Build ${{ matrix.service }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                service: [api, web, proxy]
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # docker/metadata-action distills the trigger context into a
            # set of OCI tags + labels.
            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository_owner }}/scholia-${{ matrix.service }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix={{branch}}-,format=short

            # cache-from / cache-to use the GitHub Actions cache so the
            # cargo-chef cooked-deps layer (api) and pnpm install layers
            # (web) survive across runs. Scoped per service so the three
            # matrix jobs don't trample each other.
            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/${{ matrix.service }}/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.service }}
