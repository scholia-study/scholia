name: Build

on:
    push:
        branches: [main]
        paths:
            - "apps/**"
            - "jobs/**"
            - "packages/**"
            - "db/migrations/**"
            - ".sqlx/**"
            - "assets/*/curated/**"
            - "scripts/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - ".github/workflows/build.yml"
    workflow_dispatch:
        inputs:
            images:
                description: "Rebuild all service images"
                type: boolean
                default: true
            corpora:
                description: "Corpora to build structs for (space-separated, or 'all')"
                type: string
                default: "all"

permissions:
    contents: read
    packages: write

concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.matrix.outputs.matrix }}
        steps:
            - uses: actions/checkout@v7

            - uses: dorny/paths-filter@v4
              id: filter
              with:
                  # `Cargo.lock` changes appear on every Rust filter
                  # because a lockfile shift can change transitive deps
                  # for any binary. Coarse but correct.
                  filters: |
                      api:
                        - 'apps/api/**'
                        - 'db/migrations/**'
                        - '.sqlx/**'
                        - 'packages/dataduct/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'
                      web:
                        - 'apps/web/**'
                        - 'package.json'
                        - 'pnpm-lock.yaml'
                        - 'pnpm-workspace.yaml'
                        - '.github/workflows/build.yml'
                      proxy:
                        - 'apps/proxy/**'
                        - '.github/workflows/build.yml'
                      ingest_bible:
                        - 'packages/bible_to_db/**'
                        - 'packages/reconcile/**'
                        - 'packages/common/**'
                        - 'packages/dataduct/**'
                        - 'jobs/ingest-bible/**'
                        - 'scripts/bible_import.sh'
                        - 'scripts/lib.sh'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'
                      # One struct-importer image for every corpus (CORPUS env
                      # selects at run time); parser crates don't affect the
                      # image (derived structs come from the assets bucket —
                      # the `structs` job below builds + uploads them).
                      ingest:
                        - 'packages/struct_to_db/**'
                        - 'packages/text_struct/**'
                        - 'packages/common/**'
                        - 'packages/reconcile/**'
                        - 'packages/dataduct/**'
                        - 'jobs/ingest/**'
                        - 'scripts/ingest.sh'
                        - 'scripts/lib.sh'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'

            - name: Build matrix
              id: matrix
              env:
                  EVENT: ${{ github.event_name }}
                  IMAGES_INPUT: ${{ inputs.images }}
                  API: ${{ steps.filter.outputs.api }}
                  WEB: ${{ steps.filter.outputs.web }}
                  PROXY: ${{ steps.filter.outputs.proxy }}
                  INGEST_BIBLE: ${{ steps.filter.outputs.ingest_bible }}
                  INGEST: ${{ steps.filter.outputs.ingest }}
              run: |
                  # Manual (workflow_dispatch) trigger: rebuild every image
                  # unless images=false (structs-only recovery run).
                  # paths-filter has no useful base to compare to when
                  # invoked manually with no commits in flight.
                  if [[ "$EVENT" == "workflow_dispatch" ]]; then
                      if [[ "$IMAGES_INPUT" == "true" ]]; then
                          API=true; WEB=true; PROXY=true
                          INGEST_BIBLE=true; INGEST=true
                      else
                          API=false; WEB=false; PROXY=false
                          INGEST_BIBLE=false; INGEST=false
                      fi
                  fi

                  matrix='[]'
                  add() {
                      matrix=$(echo "$matrix" | jq -c \
                          --arg s "$1" --arg c "$2" --arg f "$3" \
                          '. += [{"service": $s, "context": $c, "file": $f}]')
                  }

                  if [[ "$API"           == "true" ]]; then add api          .          apps/api/Dockerfile;          fi
                  if [[ "$WEB"           == "true" ]]; then add web          .          apps/web/Dockerfile;          fi
                  if [[ "$PROXY"         == "true" ]]; then add proxy        apps/proxy apps/proxy/Dockerfile;        fi
                  if [[ "$INGEST_BIBLE"  == "true" ]]; then add ingest-bible .          jobs/ingest-bible/Dockerfile; fi
                  if [[ "$INGEST"        == "true" ]]; then add ingest       .          jobs/ingest/Dockerfile;       fi

                  echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
                  echo "Build matrix: $matrix"

    build:
        name: Build ${{ matrix.service }}
        needs: changes
        if: needs.changes.outputs.matrix != '[]'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                include: ${{ fromJSON(needs.changes.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # docker/metadata-action distills the trigger context into a
            # set of OCI tags + labels.
            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ghcr.io/${{ github.repository_owner }}/scholia-${{ matrix.service }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix={{branch}}-,format=short

            # cache-from / cache-to use the GitHub Actions cache so the
            # cargo-chef cooked-deps layer (api) and pnpm install layers
            # (web) survive across runs. Scoped per service so the three
            # matrix jobs don't trample each other.
            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.file }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.service }}

    # Always builds structs scoped to current derived hash. Any failure will end workflow.
    structs:
        name: Build structs
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            # Pinned so output hashes never depend on the runner's rustc.
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: 1.96.0

            - uses: Swatinem/rust-cache@v2

            - name: Install rclone
              run: sudo apt-get update -qq && sudo apt-get install -y -qq rclone

            - name: Build, hash, upload
              id: structs
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.ASSETS_BUCKET_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.ASSETS_BUCKET_SECRET_ACCESS_KEY }}
                  CORPORA: ${{ inputs.corpora }}
              run: |
                  if [[ -z "$CORPORA" || "$CORPORA" == "all" ]]; then
                      CORPORA=$(bash scripts/struct.sh --list | tr '\n' ' ')
                  fi
                  echo "Corpora: $CORPORA"

                  source scripts/lib.sh
                  scholia_rclone_config

                  hashes='{}'
                  for c in $CORPORA; do
                      bash scripts/struct.sh "$c"
                      h=$(bash scripts/derived_hash.sh "$c")
                      dest="scholia:scholia-assets-auto/$c/derived@$h"
                      # `.complete` is uploaded LAST and is what the Job
                      # entrypoint (and this skip-check) looks for — a
                      # partial upload has no marker and gets re-copied
                      # (rclone copy is incremental, so re-runs are cheap).
                      if rclone lsf "$dest" --max-depth 1 | grep -qxF ".complete"; then
                          echo "$c@$h already in bucket"
                      else
                          rclone copy "assets/$c/derived" "$dest" --transfers=8
                          rclone touch "$dest/.complete"
                          echo "uploaded $c@$h (+ .complete marker)"
                      fi
                      hashes=$(jq -c --arg c "$c" --arg h "$h" '. + {($c): $h}' <<< "$hashes")
                  done
                  echo "hashes=$hashes" >> "$GITHUB_OUTPUT"
        outputs:
            hashes: ${{ steps.structs.outputs.hashes }}

    # One commit updates the whole dev overlay: image tags AND ingest Job
    # content hashes. Atomic by construction — Argo can never see a new
    # Job hash without the image bump that shipped alongside it.
    bump:
        name: Bump dev overlay
        needs: [changes, build, structs]
        # `build` is legitimately skipped on curated-only pushes and on
        # workflow_dispatch with images=false — and a job whose `needs`
        # includes a skipped job is itself skipped by default. So: run
        # unless something actually failed or the run was cancelled.
        if: ${{ !cancelled() && needs.changes.result == 'success' && needs.structs.result == 'success' && needs.build.result != 'failure' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
              with:
                  ref: main
                  token: ${{ secrets.PAT }}

            - name: Rewrite overlay image tags
              env:
                  MATRIX: ${{ needs.changes.outputs.matrix }}
                  SHA: ${{ github.sha }}
              run: |
                  # Must match docker/metadata-action's
                  # `type=sha,format=short` tag (first 7 of the sha).
                  TAG="main-${SHA:0:7}"
                  FILE=infra/k8s/overlays/dev/kustomization.yaml
                  for svc in $(echo "$MATRIX" | jq -r '.[].service'); do
                      case "$svc" in
                          api|web|proxy)
                              img="ghcr.io/scholia-study/scholia-$svc"
                              perl -0777 -pi -e \
                                "s{(name: \Q$img\E\n\s+newTag: )\S+}{\${1}$TAG}g" \
                                "$FILE"
                              echo "bumped $img -> $TAG"
                              ;;
                          *)
                              # ingest images are deliberately unpinned in the
                              # overlay (Job identity = content hash; see
                              # ingest-jobs/kustomization.yaml).
                              echo "skip $svc (no overlay tag pin)"
                              ;;
                      esac
                  done

            # Convergent, not event-driven: patch any corpus whose current
            # content hash differs from what the overlay says, regardless
            # of which push built it.
            - name: Rewrite ingest Job hashes
              env:
                  HASHES: ${{ needs.structs.outputs.hashes }}
              run: |
                  for c in $(echo "$HASHES" | jq -r 'keys[]'); do
                      h=$(echo "$HASHES" | jq -r --arg c "$c" '.[$c]')
                      f="infra/k8s/overlays/dev/ingest-jobs/ingest-$c.yaml"
                      perl -0777 -pi -e "
                          s{(name: ingest-\Q$c\E-)\S+}{\${1}$h}g;
                          s{(- name: DERIVED_HASH\n\s+value: ).*}{\${1}\"$h\"};
                      " "$f"
                      echo "ingest-$c -> $h"
                  done

            - name: Commit + push if changed
              env:
                  SHA: ${{ github.sha }}
              run: |
                  git add infra/k8s/overlays/dev
                  if git diff --cached --quiet; then
                      echo "no overlay changes to commit"
                      exit 0
                  fi
                  git config user.name "scholia-ci[bot]"
                  git config user.email "ci@scholia.study"
                  git commit -m "ci: bump dev overlay to main-${SHA:0:7} [skip ci]"
                  git push origin HEAD:main
