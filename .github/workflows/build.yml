name: Build

on:
    push:
        branches: [main]
        # Workflow-level filter — coarse gate so trivial-only pushes
        # (README edits, etc.) don't even spin up the `changes` runner.
        # Fine-grained per-service gating lives in the `changes` job
        # below.
        paths:
            - "apps/**"
            - "jobs/**"
            - "packages/**"
            - "db/migrations/**"
            - ".sqlx/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - ".github/workflows/build.yml"
    workflow_dispatch:

permissions:
    contents: read
    packages: write

concurrency:
    group: build-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            api: ${{ steps.filter.outputs.api }}
            web: ${{ steps.filter.outputs.web }}
            proxy: ${{ steps.filter.outputs.proxy }}
            ingest_bible: ${{ steps.filter.outputs.ingest_bible }}
            ingest_kant1: ${{ steps.filter.outputs.ingest_kant1 }}
        steps:
            - uses: actions/checkout@v6
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  # `Cargo.lock` changes appear on every Rust filter
                  # because a lockfile shift can change transitive deps
                  # for any binary. Coarse but correct.
                  filters: |
                      api:
                        - 'apps/api/**'
                        - 'db/migrations/**'
                        - '.sqlx/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'
                      web:
                        - 'apps/web/**'
                        - 'package.json'
                        - 'pnpm-lock.yaml'
                        - 'pnpm-workspace.yaml'
                        - '.github/workflows/build.yml'
                      proxy:
                        - 'apps/proxy/**'
                        - '.github/workflows/build.yml'
                      ingest_bible:
                        - 'packages/bible_to_db/**'
                        - 'jobs/ingest-bible/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'
                      ingest_kant1:
                        - 'packages/kant1_*/**'
                        - 'packages/common/**'
                        - 'jobs/ingest-kant1/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.github/workflows/build.yml'

    build:
        name: Build ${{ matrix.service }}
        needs: changes
        runs-on: ubuntu-latest
        if: |
            (matrix.service == 'api' && needs.changes.outputs.api == 'true') ||
            (matrix.service == 'web' && needs.changes.outputs.web == 'true') ||
            (matrix.service == 'proxy' && needs.changes.outputs.proxy == 'true') ||
            (matrix.service == 'ingest-bible' && needs.changes.outputs.ingest_bible == 'true') ||
            (matrix.service == 'ingest-kant1' && needs.changes.outputs.ingest_kant1 == 'true')
        strategy:
            fail-fast: true
            matrix:
                include:
                    - service: api
                      context: .
                      file: apps/api/Dockerfile
                    - service: web
                      context: .
                      file: apps/web/Dockerfile
                    - service: proxy
                      context: apps/proxy
                      file: apps/proxy/Dockerfile
                    - service: ingest-bible
                      context: .
                      file: jobs/ingest-bible/Dockerfile
                    - service: ingest-kant1
                      context: .
                      file: jobs/ingest-kant1/Dockerfile
        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # docker/metadata-action distills the trigger context into a
            # set of OCI tags + labels.
            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ghcr.io/${{ github.repository_owner }}/scholia-${{ matrix.service }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix={{branch}}-,format=short

            # cache-from / cache-to use the GitHub Actions cache so the
            # cargo-chef cooked-deps layer (api) and pnpm install layers
            # (web) survive across runs. Scoped per service so the three
            # matrix jobs don't trample each other.
            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.file }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.service }}
