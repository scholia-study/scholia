pre-commit:
  commands:
    format:
      priority: 1
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    cargo-fmt:
      priority: 1
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    turbo:
      priority: 2
      run: pnpm run validate
