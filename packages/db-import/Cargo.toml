[package]
name = "db-import"
version = "0.1.0"
edition = "2024"

[dependencies]
common = { path = "../common" }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
serde_json = "1"
dotenvy = "0.15"
