[package]
name = "kant3_md_to_struct"
version = "0.1.0"
edition = "2024"

[dependencies]
common = { path = "../common" }
# Reuse the kant1 markdown grammar (parse / html / figure / roman / separator /
# model) verbatim; kant3 forks only the orchestration (main + structure).
kant1_md_to_struct = { path = "../kant1_md_to_struct" }
regex = "1"
serde_json = "1"
clap = { version = "4", features = ["derive"] }
