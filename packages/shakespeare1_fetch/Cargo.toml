[package]
name = "shakespeare1_fetch"
version = "0.1.0"
edition = "2024"

[dependencies]
common = { path = "../common" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
quick-xml = "0.37"
regex = "1"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = [
    "rustls-tls",
    "blocking",
    "json",
] }
