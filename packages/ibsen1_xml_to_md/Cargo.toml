[package]
name = "ibsen1_xml_to_md"
version = "0.1.0"
edition = "2024"

[dependencies]
# roxmltree gives a read-only DOM with namespaces, document order, mixed content
# and node identity — what this converter's tail-aware, page-marker-lookahead walk
# needs. (The workspace's quick-xml is serde struct-mapping, which can't express
# document-order mixed-content serialization.)
roxmltree = "0.21"
regex = "1"
clap = { version = "4", features = ["derive"] }
