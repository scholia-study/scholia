[package]
name = "struct_to_db"
version = "0.1.0"
edition = "2024"

[dependencies]
text_struct = { path = "../text_struct" }
reconcile = { path = "../reconcile" }
dataduct = { path = "../dataduct" }
serde_json = "1"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
dotenvy = "0.15"
clap = { version = "4", features = ["derive"] }
