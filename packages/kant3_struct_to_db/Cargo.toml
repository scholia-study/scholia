[package]
name = "kant3_struct_to_db"
version = "0.1.0"
edition = "2024"

[dependencies]
common = { path = "../common" }
reconcile = { path = "../reconcile" }
# Reuse kant1's struct model (kant3's md_to_struct emits the same Output shape).
kant1_md_to_struct = { path = "../kant1_md_to_struct" }
dataduct = { path = "../dataduct" }
serde_json = "1"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
dotenvy = "0.15"
clap = { version = "4", features = ["derive"] }
