# http-context configuration: cache zones, cookie bypass map, upstreams.
# /etc/nginx/conf.d/*.conf is included inside the http {} block by the
# default nginx.conf, so these directives land in the right scope.

# Two cache zones, sized for ~700 MB combined at current content (per
# PLAN_3_TIER.md). max_size is a soft cap; nginx evicts cold entries
# when it's exceeded.
proxy_cache_path /var/cache/nginx/html
    levels=1:2
    keys_zone=html_cache:50m
    max_size=2g
    inactive=24h
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/api
    levels=1:2
    keys_zone=api_cache:50m
    max_size=2g
    inactive=24h
    use_temp_path=off;

# Authenticated requests (presence of the tower-sessions cookie) skip
# the cache entirely — both bypass on read AND refuse to store on write.
# Personalized responses can never leak into the shared cache.
#
# The cookie name is set explicitly by SessionManagerLayer.with_name()
# in apps/api/src/main.rs — keep this regex in sync.
map $http_cookie $bypass_cache {
    default                       0;
    "~*(^|;\s*)scholia_session="  1;
}

# Upstreams are rendered from ../templates/upstreams.conf.template at
# container startup — see that file and the Dockerfile for the env vars.
