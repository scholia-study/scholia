# Override of /etc/nginx/nginx.conf to load the dynamic ngx_cache_purge
# module. `load_module` must appear before any other directive, so we
# can't do this from /etc/nginx/conf.d/*.conf (which is included inside
# http {}). The rest mirrors the stock nginx:alpine config.

load_module /usr/lib/nginx/modules/ngx_http_cache_purge_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    include /etc/nginx/conf.d/*.conf;
}
