# MANUAL ingest escape hatch for the kant3 corpus — the shared
# struct-importer image (jobs/ingest) parameterized by CORPUS. No
# DERIVED_HASH env, so the entrypoint pulls the manually mirrored
# scholia-assets bucket (`just struct kant3` + `just assets-sync` first).
# The normal path is the Argo-managed auto-ingest Job
# (infra/k8s/overlays/dev/ingest-jobs/); use this one when CI is down:
#   kubectl create -f infra/k8s/jobs/ingest-kant3.yaml
apiVersion: batch/v1
kind: Job
metadata:
  generateName: ingest-kant3-
  namespace: scholia
  labels:
    ingest: kant3
spec:
  ttlSecondsAfterFinished: 86400 # 1 day
  backoffLimit: 0 # Fail fast
  template:
    metadata:
      labels:
        ingest: kant3
    spec:
      restartPolicy: Never
      containers:
        - name: ingest-kant3
          image: ghcr.io/scholia-study/scholia-ingest:main
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 1Gi
          env:
            - name: CORPUS
              value: kant3
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: database
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: CACHE_PURGE_URL
              value: http://scholia-proxy:8080
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: assets-bucket
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: assets-bucket
                  key: AWS_SECRET_ACCESS_KEY
