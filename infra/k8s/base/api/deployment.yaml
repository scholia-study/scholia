# Rust axum API.
#
# Init container runs `api migrate` against the just-started Postgres,
# applying every embedded sqlx migration. It only runs `migrate` and
# exits — migration failure blocks the main container from starting.
#
# DB connection is built from the discrete POSTGRES_{USER,PASSWORD,DB,
# HOST,PORT} vars (config::pg_connect_options_from_env), not a composed
# DATABASE_URL. k8s `$(VAR)` substitution is literal — passwords with
# URL-special chars (`:`, `/`, `@`) would break URL parsing.
# The api Secret holds all the OTHER env (Stripe, GitHub OAuth, Resend,
# etc.) and is referenced via envFrom — one place to rotate non-DB
# credentials.
#
# Image is pinned to an immutable `:main-<sha>` tag by the overlay's
# `images:` transformer (CI rewrites it on every build; Argo syncs the
# diff). The base names the `:main` tag only as a default; deploys never
# run off it. No `imagePullPolicy` — immutable tags default to
# IfNotPresent, so a given sha is pulled once and cached.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scholia-api
  labels:
    app.kubernetes.io/name: scholia-api
spec:
  replicas: 1
  strategy:
    type: Recreate # single-replica, single DB — no point doing rolling
  selector:
    matchLabels:
      app.kubernetes.io/name: scholia-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scholia-api
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/scholia-study/scholia-api:main
          command: ["api"]
          args: ["migrate"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: database
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
      containers:
        - name: api
          image: ghcr.io/scholia-study/scholia-api:main
          ports:
            - name: http
              containerPort: 4000
          env:
            # DB creds pulled from the postgres Secret so rotating the
            # password doesn't touch the api Secret. Connection options
            # are assembled inside the binary — see
            # config::pg_connect_options_from_env.
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: database
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            # The PURGE listener is on the proxy's cluster-internal
            # port 8080 (NetworkPolicy restricts it to this pod's
            # label). Empty value would silently disable PURGE — we
            # set it explicitly so any misconfig surfaces fast.
            - name: CACHE_PURGE_URL
              value: http://scholia-proxy:8080
          envFrom:
            # Pulls every other env var the API needs:
            # RESEND_API_KEY, FROM_EMAIL, BACKEND_URL, FRONTEND_URL,
            # GITHUB_CLIENT_ID/SECRET/REDIRECT_URI, STRIPE_API_KEY,
            # STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_BASE/MID/HIGH.
            # Authored as a SOPS-encrypted manifest in the overlay.
            - secretRef:
                name: api
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
