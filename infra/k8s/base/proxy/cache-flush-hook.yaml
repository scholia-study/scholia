apiVersion: batch/v1
kind: Job
metadata:
  # Fixed name (not generateName): kustomize requires metadata.name, and
  # the BeforeHookCreation delete-policy means Argo removes the prior
  # Job of this name before recreating it each sync — so the last run
  # stays inspectable and they don't accumulate.
  name: scholia-cache-flush
  labels:
    app.kubernetes.io/name: scholia-cache-flush
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scholia-cache-flush
    spec:
      restartPolicy: Never
      containers:
        - name: flush
          image: curlimages/curl:8.11.1
          # Two purges, so a shell. URLs are quoted so the `*` is sent
          # literally (no glob). No -f: a 412 (empty cache) must not
          # fail, and `;` runs the api purge even if the html one errors.
          command:
            - sh
            - -c
            - |
              curl -sS --retry 3 --retry-connrefused -X PURGE "http://scholia-proxy:8080/*"
              curl -sS --retry 3 --retry-connrefused -X PURGE "http://scholia-proxy:8080/api/*"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
