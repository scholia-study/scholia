# Dev-only proxy patch: render the security fragment (cookie gate + robots
# + webhook carve-out) and mount it into /etc/nginx/conf.d/security/.
#
# The fragment is an envsubst template (proxy-security.conf.template) so the
# gate token stays in the SOPS-encrypted proxy-dev-gate Secret instead of the
# plaintext ConfigMap. The official nginx entrypoint only envsubst's its own
# template dir, so a `render-gate` initContainer does the substitution into a
# shared emptyDir that the proxy then mounts read-only.
#
# Strategic merge merges by name on list items (initContainers, containers,
# volumes, volumeMounts), so this APPENDS rather than replacing.
#
# The ConfigMap name is `proxy-security`, but Kustomize appends a content
# hash to the generated name; the configMap.name reference below gets
# rewritten to match at apply time.

apiVersion: apps/v1
kind: Deployment
metadata:
    name: scholia-proxy
spec:
    template:
        spec:
            initContainers:
                - name: render-gate
                  image: nginx:1.27-alpine
                  command:
                      - sh
                      - -c
                      - envsubst '$DEV_GATE_TOKEN' < /tpl/lockdown.conf.template > /out/lockdown.conf
                  env:
                      - name: DEV_GATE_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: proxy-dev-gate
                                key: token
                  volumeMounts:
                      - name: security-template
                        mountPath: /tpl
                        readOnly: true
                      - name: security-rendered
                        mountPath: /out
            containers:
                - name: proxy
                  volumeMounts:
                      - name: security-rendered
                        mountPath: /etc/nginx/conf.d/security
                        readOnly: true
            volumes:
                - name: security-template
                  configMap:
                      name: proxy-security
                - name: security-rendered
                  emptyDir: {}
