# KSOPS generator — turns the SOPS-encrypted files in secrets/ into real
# Secret resources at `kustomize build` time.
#
# ArgoCD's repo-server runs this via the `ksops` exec KRM function (the
# annotation below). kustomize must be invoked with
# `--enable-alpha-plugins --enable-exec` — set cluster-wide in the
# argocd-cm `kustomize.buildOptions` (see infra/argo/values.yaml). The
# age private key is mounted into the repo-server and pointed at by
# SOPS_AGE_KEY_FILE; ksops uses it to decrypt.
#
# To build locally: `export SOPS_AGE_KEY_FILE=...` and have `ksops` +
# `kustomize` on PATH, then `kustomize build --enable-alpha-plugins
# --enable-exec infra/k8s/overlays/dev`.
#
# Encrypted files stay in git; plaintext only ever exists in memory
# during the build.

apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: scholia-secrets
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/postgres.yaml
  - secrets/api.yaml
  - secrets/assets-bucket.yaml
  - secrets/proxy-dev-gate.yaml
