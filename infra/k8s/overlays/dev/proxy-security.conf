# Dev-cluster lockdown fragment. Mounted into the proxy at
# /etc/nginx/conf.d/security/lockdown.conf via a ConfigMap, then picked
# up by the `include /etc/nginx/conf.d/security/*.conf;` directive in
# the base default.conf template.
#
# Three concerns rolled into one file (single ConfigMap entry):
#   1. add_header X-Robots-Tag — discourage well-behaved crawlers
#      from indexing the dev hostname.
#   2. auth_basic — gate every request behind HTTP Basic Auth, with
#      credentials in the proxy-htpasswd Secret.
#   3. location overrides — /robots.txt served inline with the
#      Disallow body (no auth, so crawlers can read it), and
#      /api/webhooks/ carved out from auth so Stripe webhook delivery
#      keeps working.

add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
auth_basic           "Scholia dev — restricted";
auth_basic_user_file /etc/nginx/auth/htpasswd;

location = /robots.txt {
    auth_basic off;
    add_header Content-Type "text/plain"                       always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive"     always;
    return 200 "User-agent: *\nDisallow: /\n";
}

location ^~ /api/webhooks/ {
    auth_basic off;
    proxy_pass http://rust_api;
    proxy_cache off;
    add_header X-Cache-Status $upstream_cache_status           always;
    add_header X-Robots-Tag   "noindex, nofollow, noarchive"   always;
}
