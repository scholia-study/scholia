# Dev environment overlay.
#
# Layers dev-specific behavior over the prod-neutral base:
#   - Ingress hostname patched to dev.scholia.study + flipped to
#     letsencrypt-prod cluster-issuer.
#   - Proxy gets a "security fragment" ConfigMap (cookie gate, robots
#     noindex header, Stripe-webhook carve-out) shipped as an envsubst
#     template; a render-gate initContainer fills in the gate token from
#     the proxy-dev-gate Secret and the proxy mounts the result into
#     /etc/nginx/conf.d/security/. Base proxy stays public + prod-ready;
#     dev opts in to lockdown via this patch.
#
# Secrets in secrets/ are NOT referenced here — they're SOPS-encrypted
# and applied separately via `sops -d <file> | kubectl apply -f -`
# before `kubectl apply -k overlays/dev/`. The gate token lives in
# secrets/proxy-dev-gate.yaml under key `token`.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scholia

resources:
  - ../../base

configMapGenerator:
  - name: proxy-security
    files:
      - lockdown.conf.template=proxy-security.conf.template

patches:
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: scholia
  - path: proxy-lockdown-patch.yaml
    target:
      kind: Deployment
      name: scholia-proxy
