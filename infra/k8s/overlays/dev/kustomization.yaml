# Dev environment overlay.
#
# Layers dev-specific behavior over the prod-neutral base:
#   - Ingress hostname patched to dev.scholia.study + flipped to
#     letsencrypt-prod cluster-issuer.
#   - Proxy gets a "security fragment" ConfigMap (cookie gate, robots
#     noindex header, Stripe-webhook carve-out) shipped as an envsubst
#     template; a render-gate initContainer fills in the gate token from
#     the proxy-dev-gate Secret and the proxy mounts the result into
#     /etc/nginx/conf.d/security/. Base proxy stays public + prod-ready;
#     dev opts in to lockdown via this patch.
#
# Secrets in secrets/ are SOPS-encrypted and pulled in via the KSOPS
# generator (secret-generator.yaml). ArgoCD's repo-server decrypts them
# inline during `kustomize build` using the age key mounted there; the
# plaintext never lands in git. To build locally you need the age key in
# SOPS_AGE_KEY_FILE and ksops on PATH. The gate token lives in
# secrets/proxy-dev-gate.yaml under key `token`.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scholia

resources:
  - ../../base
  # Auto-ingest Jobs (CI bumps content hashes, Argo runs them — see
  # ingest-jobs/kustomization.yaml for the full mechanics).
  - ingest-jobs

generators:
  - secret-generator.yaml

# Image tags are immutable `main-<sha>` pins. CI's write-back step
# (.github/workflows/build.yml) rewrites the newTag values on every
# build and commits to main; ArgoCD syncs the diff. The PLACEHOLDER
# values are overwritten on the first CI run after this lands.
images:
  - name: ghcr.io/scholia-study/scholia-api
    newTag: main-60adb7c
  - name: ghcr.io/scholia-study/scholia-web
    newTag: main-2a72af2
  - name: ghcr.io/scholia-study/scholia-proxy
    newTag: main-60adb7c

configMapGenerator:
  - name: proxy-security
    files:
      - lockdown.conf.template=proxy-security.conf.template

patches:
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: scholia
  - path: proxy-lockdown-patch.yaml
    target:
      kind: Deployment
      name: scholia-proxy
