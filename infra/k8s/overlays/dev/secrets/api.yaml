# Rust API env-var Secret. Pulled by the scholia-api Deployment via
# `envFrom.secretRef.name: api`. Holds every secret AppConfig::from_env
# expects (see apps/api/src/config.rs), minus DATABASE_URL which the
# Deployment composes from the `postgres` Secret at runtime.
#
# This file MUST be SOPS-encrypted before commit. See the .sops.yaml
# at the repo root for the encryption policy.
#
# After cloning a fresh repo or rotating any value, encrypt with:
#   sops -e -i infra/k8s/overlays/dev/secrets/api.yaml
#
# Edit with:
#   sops infra/k8s/overlays/dev/secrets/api.yaml
#
# Apply:
#   sops -d infra/k8s/overlays/dev/secrets/api.yaml | kubectl apply -f -
