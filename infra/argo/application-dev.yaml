# ArgoCD Application for the dev cluster.
#
# Registered once at bootstrap: `kubectl apply -f infra/argo/application-dev.yaml`
# (over the tailnet). After that Argo watches git and self-manages;
# re-apply only when THIS spec changes.
#
# Single Application (not app-of-apps) — we deploy exactly one app. It
# points at the dev overlay; Argo runs `kustomize build` there (with the
# KSOPS plugin enabled on the repo-server) and keeps the scholia
# namespace matching the result: api, web, proxy, postgres, ingress,
# the SOPS-decrypted Secrets, and the auto-ingest Jobs
# (overlays/dev/ingest-jobs/ — hash-named, CI-bumped; prune removes the
# old Job when CI renames one).
#
# NOT covered (by design): Bible ingest + the manual ingest escape
# hatch (infra/k8s/jobs/, run on-demand via kubectl) and cert-manager +
# its ClusterIssuers (one-time manual install). Those live outside
# overlays/dev so this Application never sees them.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scholia-dev
  namespace: argocd
  annotations:
    # Failure notifications → ntfy (see values.yaml `notifications:` +
    # README bootstrap for the topic-URL secret). Empty value = the
    # service's static config decides where it goes.
    notifications.argoproj.io/subscribe.on-health-degraded.ntfy: ""
    notifications.argoproj.io/subscribe.on-sync-failed.ntfy: ""
spec:
  project: default
  source:
    repoURL: https://github.com/scholia-study/scholia.git
    targetRevision: main
    path: infra/k8s/overlays/dev
  destination:
    # This same cluster — one self-contained Argo per cluster.
    server: https://kubernetes.default.svc
    namespace: scholia
  syncPolicy:
    automated:
      prune: true # delete resources removed from git
      selfHeal: true # revert out-of-band kubectl edits back to git
    syncOptions:
      # base/namespace.yaml already declares the scholia namespace, so
      # Argo doesn't need to create it.
      - CreateNamespace=false
      # Only apply resources that actually differ. Load-bearing for the
      # ingest Jobs' Force=true,Replace=true (immutable-spec changes
      # deploy as delete+recreate): without this, EVERY sync would
      # recreate — i.e. re-run — all five Jobs.
      - ApplyOutOfSyncOnly=true
