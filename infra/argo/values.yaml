# Helm values for installing ArgoCD itself (NOT synced by Argo — applied
# manually at bootstrap; see README.md). Chart: argo/argo-cd.
#
#   helm repo add argo https://argoproj.github.io/argo-helm
#   helm upgrade --install argocd argo/argo-cd \
#     -n argocd --create-namespace \
#     --version 9.5.20 -f infra/argo/values.yaml
#
# Chart 9.5.20 = ArgoCD v3.4.3 (checked 2026-06-07). Re-check
# `helm search repo argo/argo-cd --versions` before a fresh install and
# bump if a newer stable has landed. Keeping the pin on the CLI rather
# than here means the runbook records exactly what ran.
#
# The one non-default thing here is KSOPS on the repo-server, so that
# `kustomize build` can decrypt the SOPS-encrypted secrets in
# overlays/dev/secrets/. Recipe: an init container drops the `ksops` and
# `kustomize` binaries into a shared volume, the repo-server mounts them
# onto PATH, the age key is mounted from the `sops-age` Secret (created
# manually at bootstrap), and kustomize is told to allow exec plugins.

global:
  # Single small node (CX22) — one of each controller, no HA.
  revisionHistoryLimit: 3

# Trim components we don't use to keep the footprint small on a 4GB node.
dex:
  enabled: false # no external SSO; local admin login only

# Notifications: failures push to ntfy (phone). The topic URL is a
# secret (topic name = credential), so it lives in the manually created
# `argocd-notifications-secret` (see README bootstrap), referenced here
# as $ntfy-url. The Application CR opts in via
# `notifications.argoproj.io/subscribe.…` annotations
# (application-dev.yaml). Failures only — no per-deploy chatter.
notifications:
  enabled: true
  secret:
    create: false # created manually: key `ntfy-url` = https://ntfy.sh/<topic>
  notifiers:
    service.webhook.ntfy: |
      url: $ntfy-url
      headers:
        - name: Title
          value: Argo scholia-dev
        - name: Priority
          value: high
        - name: Tags
          value: warning
  templates:
    # Body lists only the unhealthy resources (kind/name + k8s health
    # message). Deeper "why" (e.g. a reconcile-abort reason) is in pod
    # logs, which notifications can't see — hence the logs pointer.
    template.app-degraded: |
      webhook:
        ntfy:
          method: POST
          body: |
            {{.app.metadata.name}} is Degraded.
            {{- range .app.status.resources }}
            {{- if and .health (ne .health.status "Healthy") (ne .health.status "Progressing") }}
            {{ .kind }}/{{ .name }}: {{ .health.status }}{{ if .health.message }} — {{ .health.message }}{{ end }}
            {{- end }}
            {{- end }}
            logs: kubectl logs -n scholia job/<name> (or the Argo UI)
    template.app-sync-failed: |
      webhook:
        ntfy:
          method: POST
          body: |
            {{.app.metadata.name}} sync FAILED.
            {{.app.status.operationState.message}}
  triggers:
    trigger.on-health-degraded: |
      - when: app.status.health.status == 'Degraded'
        send: [app-degraded]
    trigger.on-sync-failed: |
      - when: app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]
applicationSet:
  # This chart's applicationSet section has no `enabled` key (unlike dex
  # / notifications above) — scaling to zero is how you switch the
  # controller off. We hand-write one Application per cluster, so the
  # ApplicationSet controller has nothing to reconcile.
  replicas: 0

configs:
  cm:
    # Allow the KSOPS exec KRM function during `kustomize build`. Without
    # these flags the ksops generator in overlays/dev is ignored and the
    # Secrets never materialize.
    kustomize.buildOptions: --enable-alpha-plugins --enable-exec
  params:
    # argocd-server behind a port-forward terminates its own TLS; running
    # insecure avoids redirect/cert friction over `kubectl port-forward`.
    server.insecure: true

server:
  # No ingress for Argo — reached only via `kubectl port-forward` over
  # the tailnet (see README). ClusterIP keeps it off the public edge.
  service:
    type: ClusterIP

repoServer:
  # --- KSOPS wiring -------------------------------------------------
  initContainers:
    - name: install-ksops
      # Pinned to the current ksops release. The v4.5.1 image is
      # distroless — no /bin/sh — so the old `sh -c "mv ksops ..."` recipe
      # fails with StartError. The binary's own `install` subcommand
      # copies itself, and kustomize too via --with-kustomize, into the
      # mounted /custom-tools emptyDir. Verified against the v4.5.1 image
      # 2026-06-08. Releases:
      #   https://github.com/viaduct-ai/kustomize-sops/releases
      image: viaductoss/ksops:v4.5.1
      command:
        - /usr/local/bin/ksops
        - install
        - --with-kustomize
        - /custom-tools
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: sops-age # created manually at bootstrap (see README)
  volumeMounts:
    # Override the chart's bundled kustomize with the KSOPS-enabled one,
    # and put the ksops binary on PATH.
    - mountPath: /usr/local/bin/kustomize
      name: custom-tools
      subPath: kustomize
    - mountPath: /usr/local/bin/ksops
      name: custom-tools
      subPath: ksops
    - mountPath: /home/argocd/.config/sops/age
      name: sops-age
  env:
    - name: SOPS_AGE_KEY_FILE
      value: /home/argocd/.config/sops/age/keys.txt
